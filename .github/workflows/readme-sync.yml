name: Auto-Update README Table
on:
  push:
    branches: [ main ]

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Generate Table using Python
        run: |
          python -c "
          import os
          # Find all folders that start with a number (like 0001-two-sum)
          folders = sorted([f for f in os.listdir('.') if os.path.isdir(f) and f[0].isdigit()])
          
          table = '| Problem Folder | Link |\n|---|---|\n'
          for f in folders: 
              table += f'| {f} | [View Code](./{f}) |\n'
          
          with open('README.md', 'r') as file: content = file.read()
          start, end = content.find(''), content.find('')
          
          if start != -1 and end != -1:
              new_content = content[:start + 20] + '\n' + table + '\n' + content[end:]
              with open('README.md', 'w') as file: file.write(new_content)
          "
          
      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git commit -m "Auto-updated README table with folders" || exit 0
          git push
