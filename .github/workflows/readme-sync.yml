name: Auto-Update README Table
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Generate Table using Python
        run: |
          python -c "
          import os
          files = [f for f in os.listdir('.') if f.endswith('.py')]
          table = '| Problem | Language |\n|---|---|\n'
          for f in files: table += f'| {f} | Python |\n'
          
          with open('README.md', 'r') as file: content = file.read()
          # Assumes you have and in your README
          start, end = content.find(''), content.find('')
          if start != -1 and end != -1:
              new_content = content[:start + 20] + '\n' + table + '\n' + content[end:]
              with open('README.md', 'w') as file: file.write(new_content)
          "
          
      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add README.md
          git commit -m "Auto-updated README table" || exit 0
          git push
