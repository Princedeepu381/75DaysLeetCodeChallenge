name: Auto-Update README Table
on:
  push:
    branches: [ main ]

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Generate Table using Python
        run: |
          python -c "
          import os, re
          
          # 1. Find the folders
          folders = sorted([f for f in os.listdir('.') if os.path.isdir(f) and f[0].isdigit()])
          
          # 2. Build the table with strict Markdown spacing
          table = '\n\n| Problem Folder | Link |\n|---|---|\n'
          for f in folders: 
              table += f'| {f} | [View Code](./{f}) |\n'
          table += '\n'
          
          # 3. Read the README
          with open('README.md', 'r') as file: 
              content = file.read()
          
          # 4. Safely replace everything between the START and END tags
          new_content = re.sub(
              r'().*?()', 
              r'\1' + table + r'\2', 
              content, 
              flags=re.DOTALL
          )
          
          # 5. Write the changes
          with open('README.md', 'w') as file: 
              file.write(new_content)
          "
          
      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git commit -m "Fixed markdown table rendering" || exit 0
          git push
