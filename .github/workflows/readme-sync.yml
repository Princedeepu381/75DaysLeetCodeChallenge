name: Auto-Update README Table
on:
  push:
    branches: [ main ]

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Generate Clean README
        run: |
          cat << 'EOF' > generate_readme.py
          import os
          folders = sorted([f for f in os.listdir('.') if os.path.isdir(f) and f[0].isdigit()])
          
          readme = """<div align="center">
            <a href="https://leetcode.com/princedeepu381/">
              <img src="https://leetcard.jacoblin.cool/princedeepu381?ext=activity" alt="LeetCode Stats" />
            </a>
          </div>\n
          ### 🚀 Solved Problems\n
          | Problem Folder | Link |
          |---|---|
          """
          
          for f in folders:
              readme += f"| {f} | [View Code](./{f}) |\n"
              
          with open("README.md", "w") as f:
              f.write(readme)
          EOF
          python generate_readme.py
          rm generate_readme.py
          
      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git commit -m "Rebuilt README completely from scratch" || exit 0
          git push
