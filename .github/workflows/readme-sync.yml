name: Auto-Update README Table
on:
  push:
    branches: [ main ]

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Generate Clean README
        run: |
          cat << 'EOF' > generate_readme.py
          import os
          import re
          import urllib.request
          import json
          import time

          # 1. Find the folders
          folders = sorted([f for f in os.listdir('.') if os.path.isdir(f) and f[0].isdigit()])

          # 2. Function to fetch topics from LeetCode API
          def get_topics(slug):
              time.sleep(0.5) # Tiny delay to prevent getting IP banned by LeetCode
              try:
                  req = urllib.request.Request("https://leetcode.com/graphql", method="POST")
                  req.add_header("Content-Type", "application/json")
                  # The Magic Fix: Pretend to be a real Google Chrome browser
                  req.add_header("User-Agent", "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36")
                  req.add_header("Referer", f"https://leetcode.com/problems/{slug}/")
                  
                  query = {"query": 'query { question(titleSlug: "' + slug + '") { topicTags { name } } }'}
                  data = json.dumps(query).encode("utf-8")
                  
                  response = urllib.request.urlopen(req, data=data, timeout=10)
                  res = json.loads(response.read().decode("utf-8"))
                  
                  if "data" in res and res["data"]["question"] and "topicTags" in res["data"]["question"]:
                      tags = res["data"]["question"]["topicTags"]
                      return ", ".join([tag["name"] for tag in tags])
                  return "N/A"
              except Exception as e:
                  print(f"Failed to fetch for {slug}: {e}") # This will show up in Actions Logs if it fails
                  return "N/A"

          # 3. Build the README string
          readme = """<div align="center">
            <a href="https://leetcode.com/princedeepu381/">
              <img src="https://leetcard.jacoblin.cool/princedeepu381?ext=activity" alt="LeetCode Stats" />
            </a>
          </div>\n
          ### 🚀 Solved Problems\n
          | Problem Folder | Topics | Link |
          |---|---|---|
          """

          # 4. Generate table rows
          for f in folders:
              match = re.match(r'^\d+-(.+)$', f)
              slug = match.group(1) if match else f
              topics = get_topics(slug)
              
              readme += f"| {f} | {topics} | [View Code](./{f}) |\n"
              
          # 5. Write to README.md
          with open("README.md", "w", encoding="utf-8") as file:
              file.write(readme)
          EOF
          python generate_readme.py
          rm generate_readme.py
          
      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git commit -m "Fixed LeetCode API bot block" || exit 0
          git push
